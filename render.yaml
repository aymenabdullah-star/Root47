services:
  - type: web
    name: bmw-watchtower
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEATHERWALAY_USERNAME
        sync: false
      - key: WEATHERWALAY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
